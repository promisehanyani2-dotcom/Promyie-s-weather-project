<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <title>Promyie's App</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="weather-details">
      <h1>Weather App</h1>
      <header>
        <form class="searching" id="searching-form">
          <input
            type="search"
            placeholder="Enter a city.."
            required
            class="searching-input"
            id="searching-input"
          />
          <input type="submit" value="Search" class="searching-button" />
        </form>
      </header>
      <main>
        <div class="weather-information">
          <div>
            <h1 class="weather-city" id="place">South Africa</h1>
            <p class="weather-about">
              <span id="place-time">Monday 14:49</span>,
              <span id="place-condition">slightly cloudy</span>
              <br />
              Humidity: <strong id="humidity">66%</strong>, Wind:
              <strong id="wind-speed">3.13km/h</strong>
            </p>
          </div>
          <div class="weather-info">
            <div class="icon">🌤️</div>
            <div class="value" id="temperature">18</div>
            <div class="unit">°C</div>
          </div>
        </div>
      </main>

      <footer>
        This project was coded by
        <a href="https://github.com/promisehanyani2-dotcom" target="_blank">
          Promise Hanyani</a
        >, is
        <a
          href="https://github.com/promisehanyani2-dotcom/Promyie-s-weather-project"
          target="_blank"
          >open-sourced on GitHub</a
        >
        and
        <a href="https://promyie.netlify.app/" target="_blank"
          >hosted on Netlify</a
        >
      </footer>
    </div>
    <script src="index.js"></script>
  </body>
</html>
